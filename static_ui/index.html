<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Analytics System - Management Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #F2F2F2; /* Clean White */
            --bg: #0A0A0A;
            --card: #141414;
            --text: #F2F2F2;
            --accent: #2A2A2A;
            --muted: #888;
            --glass: rgba(255, 255, 255, 0.05);
            --gradient: linear-gradient(135deg, #FFF 0%, #AAA 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent);
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: var(--muted);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="file"], input[type="text"], input[type="number"], select {
            background: #000;
            border: 1px solid var(--accent);
            padding: 14px 18px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #FFF;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        input[type="file"]::file-selector-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            margin-right: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #AAA;
        }

        .checkbox-group input {
            cursor: pointer;
            accent-color: #FFF;
            width: 18px;
            height: 18px;
        }

        button {
            grid-column: span 2;
            margin-top: 20px;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #000;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        button:hover {
            background: #FFF;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            grid-column: span 2;
            margin-top: 30px;
            padding: 24px;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--accent);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #BBB;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #FFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 14px 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            transition: border-color 0.2s;
        }

        .result-item:hover {
            border-color: #555;
        }

        .result-item a {
            color: #FFF;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .result-item a:hover {
            background: #FFF;
            color: #000;
            border-color: #FFF;
        }

        .badge {
            background: var(--accent);
            color: #AAA;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: auto; }
            button { grid-column: auto; }
            #status { grid-column: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Analytics System</h1>
            <p class="subtitle">AI-Powered Biomechanics Port</p>
        </header>

        <form id="analysisForm">
            <div class="form-group full-width">
                <label for="file">Source Video (.mp4)</label>
                <input type="file" id="file" name="file" accept="video/mp4" required>
            </div>

            <div class="form-group">
                <label for="player_id">Subject ID</label>
                <input type="number" id="player_id" name="player_id" value="1" min="1">
            </div>

            <div class="form-group">
                <label for="yolo_size">Tracker Precision</label>
                <select id="yolo_size" name="yolo_size">
                    <option value="n">Lite</option>
                    <option value="s">Standard</option>
                    <option value="m" selected>Advanced</option>
                    <option value="l">High-Def</option>
                    <option value="x">Clinical</option>
                </select>
            </div>

            <div class="form-group">
                <label for="player_height">Height (m)</label>
                <input type="number" id="player_height" name="player_height" value="1.75" step="0.01">
            </div>

            <div class="form-group">
                <label for="mass_kg">Mass (kg)</label>
                <input type="number" id="mass_kg" name="mass_kg" value="75" step="1">
            </div>

            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="run_sports2d" name="run_sports2d">
                    Include Deep Pipeline (Extended)
                </label>
            </div>

            <button type="submit" id="submitBtn">Process Analysis</button>
        </form>

        <div id="status">
            <div id="loadingMessage" style="display: none;">
                <div class="loader">
                    <div class="spinner"></div>
                    <div id="loaderText">Uploading video and starting analysis...</div>
                </div>
                <div id="progressBarContainer" style="width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 15px; overflow: hidden; display: none;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: #FFF; transition: width 0.3s ease;"></div>
                </div>
            </div>
            
            <div id="errorMessage" style="display: none; color: #FFF; background: #330000; padding: 15px; border-radius: 8px;">
                <strong>Error:</strong> <span id="errorText"></span>
            </div>
        </div>

        <!-- NEW: Integrated Dashboard Section (Hidden until processing is done) -->
        <div id="dashboardSection" style="display: none; margin-top: 50px; animation: fadeIn 0.8s ease;">
            <header style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <h2 id="resultTitle" style="font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px;">Analysis Report</h2>
                    <p id="resultSubtitle" style="color: var(--muted); font-size: 0.9rem;">Biomechanical Performance Data</p>
                </div>
                <button onclick="location.reload()" style="padding: 10px 20px; font-size: 0.8rem; margin: 0;">New Upload</button>
            </header>

            <div class="analysis-grid" style="display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px;">
                <!-- Video Feed -->
                <div class="card" style="grid-column: span 8; background: #000; padding: 0; overflow: hidden; border: 1px solid var(--accent);">
                    <video id="resultVideo" controls style="width: 100%; display: block;"></video>
                </div>

                <!-- KPI Side Column -->
                <div style="grid-column: span 4; display: flex; flex-direction: column; gap: 15px;">
                    <div class="kpi-mini" style="background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                        <label style="color: #666; font-size: 0.7rem;">Injury Risk Score</label>
                        <h3 id="kpiRisk" style="font-size: 1.8rem; color: #FFF;">--/100</h3>
                    </div>
                    <div class="kpi-mini" style="background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                        <label style="color: #666; font-size: 0.7rem;">Gait Symmetry</label>
                        <h3 id="kpiSymmetry" style="font-size: 1.8rem; color: #FFF;">--%</h3>
                    </div>
                    <div class="kpi-mini" style="background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                        <label style="color: #666; font-size: 0.7rem;">Max Speed</label>
                        <h3 id="kpiSpeed" style="font-size: 1.8rem; color: #FFF;">-- m/s</h3>
                    </div>
                </div>

                <!-- Charts -->
                <div class="card" style="grid-column: span 6; background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                    <h4 style="font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; color: #888;">Speed & Acceleration</h4>
                    <canvas id="speedChart" height="200"></canvas>
                </div>
                <div class="card" style="grid-column: span 6; background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                    <h4 style="font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px; color: #888;">Joint Mobility (Knee Flexion)</h4>
                    <canvas id="jointChart" height="200"></canvas>
                </div>
                
                <!-- Resources -->
                <div class="card" style="grid-column: span 12; background: #050505; padding: 20px; border-radius: 12px; border: 1px solid var(--accent);">
                    <h4 style="font-size: 0.8rem; text-transform: uppercase; margin-bottom: 20px; color: #888;">Data Exports</h4>
                    <div id="exportLinks" style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <!-- Placeholder for links -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js and Dashboard Logic -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const form = document.getElementById('analysisForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');
        const loadingMessage = document.getElementById('loadingMessage');
        const loaderText = document.getElementById('loaderText');
        const dashboardSection = document.getElementById('dashboardSection');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        let pollInterval = null;
        let speedChart = null;
        let jointChart = null;

        // --- PIPELINE STEP 3: RENDER RESULTS ---
        function renderDashboard(data) {
            console.log("Rendering Dashboard with data:", data);
            
            // Hide loading, show dashboard
            loadingMessage.style.display = 'none';
            form.style.display = 'none'; // Hide the form entirely
            dashboardSection.style.display = 'block';

            // 1. Update Video
            const video = document.getElementById('resultVideo');
            video.src = data.video_url;
            video.load();

            // 2. Update KPIs
            const summary = data.summary.player_summary;
            document.getElementById('kpiRisk').innerText = `${Math.round(summary.peak_risk_score)}/100`;
            document.getElementById('kpiSymmetry').innerText = `${Math.round(summary.gait_symmetry_pct)}%`;
            document.getElementById('kpiSpeed').innerText = `${summary.max_speed.toFixed(1)} m/s`;

            // 3. Update Charts
            const frames = data.summary.frame_metrics;
            const labels = frames.map(f => (f.timestamp).toFixed(1) + 's');
            
            // Speed Chart
            const speedCtx = document.getElementById('speedChart').getContext('2d');
            if(speedChart) speedChart.destroy();
            speedChart = new Chart(speedCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Speed (m/s)',
                        data: frames.map(f => f.speed),
                        borderColor: '#FFF',
                        borderWidth: 2,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } }, x: { display: false } } }
            });

            // Joint Chart
            const jointCtx = document.getElementById('jointChart').getContext('2d');
            if(jointChart) jointChart.destroy();
            jointChart = new Chart(jointCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Left Knee', data: frames.map(f => f.left_knee_flexion || f.left_knee_angle), borderColor: '#00f2fe', tension: 0.4, pointRadius: 0 },
                        { label: 'Right Knee', data: frames.map(f => f.right_knee_flexion || f.right_knee_angle), borderColor: '#4facfe', tension: 0.4, pointRadius: 0 }
                    ]
                },
                options: { responsive: true, scales: { y: { grid: { color: '#222' } }, x: { display: false } } }
            });

            // 4. Update Export Links
            const exportContainer = document.getElementById('exportLinks');
            exportContainer.innerHTML = '';
            if (data.data_urls) {
                Object.entries(data.data_urls).forEach(([name, url]) => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = "_blank";
                    a.innerText = name.toUpperCase();
                    a.style = "color: #FFF; text-decoration: none; padding: 10px 15px; background: #111; border: 1px solid #333; border-radius: 6px; font-size: 0.7rem; letter-spacing: 1px;";
                    exportContainer.appendChild(a);
                });
            }
        }

        // --- PIPELINE STEP 2: POLL STATUS ---
        async function pollStatus(jobId) {
            try {
                const response = await fetch(`/analyses/${jobId}`);
                
                // If it's a 404, just wait
                if (response.status === 404) {
                    console.log("Record not found yet, retrying...");
                    return;
                }

                // Verify the response is JSON before parsing
                const contentType = response.headers.get("content-type");
                if (!response.ok || !contentType || !contentType.includes("application/json")) {
                    console.warn("Received a non-JSON response from server. This is typical during a cold start or DB delay.");
                    return; // Fail silently and try again in 3s
                }
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    clearInterval(pollInterval);
                    renderDashboard(data);
                } else if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    throw new Error(data.error || "Analysis failed on server");
                } else {
                    loaderText.innerText = "Analyzing Biomechanics... This takes 1-3 minutes.";
                }
            } catch (err) {
                console.error("Polling Error:", err);
                // We keep polling even on error unless it's a 'failed' status
            }
        }

        // --- PIPELINE STEP 1: START UPLOAD ---
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) {
                alert("Please select a video file first.");
                return;
            }

            // UI Reset
            submitBtn.disabled = true;
            statusDiv.style.display = 'block';
            loadingMessage.style.display = 'block';
            loaderText.innerText = 'Uploading highly-compressed video stream...';
            errorMessage.style.display = 'none';

            const formData = new FormData(form);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.status === 202 || response.ok) {
                    // Start Polling
                    loaderText.innerText = 'Upload Successful. Initializing AI environment...';
                    if (pollInterval) clearInterval(pollInterval);
                    pollInterval = setInterval(() => pollStatus(data.job_id), 3000);
                } else {
                    throw new Error(data.detail || data.message || 'Analysis failed to start');
                }

            } catch (err) {
                loadingMessage.style.display = 'none';
                errorMessage.style.display = 'block';
                errorText.innerText = err.message;
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
